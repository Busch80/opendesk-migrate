# Prometheus configuration for opendesk-migrate

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: odmig

scrape_configs:
  - job_name: odmig-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
          tier: backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
