name: opendesk-migrate

x-app-env: &app-env
  APP_ENV: ${APP_ENV:-production}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  APP_URL: ${APP_URL:-https://mig.kpx.ch}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-odmig}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-odmig}
  REDIS_URL: redis://redis:6379/0
  REDIS_RESULT_BACKEND: redis://redis:6379/1
  FERNET_KEY: ${FERNET_KEY:?FERNET_KEY must be set (44 chars)}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (>= 32 chars)}
  STORAGE_BACKEND: local
  STAGING_PATH: /staging
  STAGING_MAX_GB: ${STAGING_MAX_GB:-500}
  STAGING_RETENTION_DAYS: ${STAGING_RETENTION_DAYS:-14}
  M365_DEFAULT_TENANT_ID: ${M365_DEFAULT_TENANT_ID:-}
  M365_AUTHORITY: https://login.microsoftonline.com
  PROMETHEUS_ENABLED: "true"
  GRAPH_REQUESTS_PER_MINUTE: 5000
  GRAPH_BURST_SIZE: 50
  GRAPH_RETRY_MAX_ATTEMPTS: 5

services:
  web:
    build:
      context: ./web
      args:
        VITE_API_URL: /
    image: odmig-web:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [internal]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`mig.kpx.ch`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=8080"

  api:
    build:
      context: ./api
    image: odmig-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
      WEB_CONCURRENCY: ${API_WORKERS:-2}
      AUTO_MIGRATE: "true"
    command: ["/usr/bin/tini", "--", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - staging:/staging:rw
    networks: [internal]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`mig.kpx.ch`) && PathPrefix(`/api`, `/metrics`, `/health`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  worker-mail:
    build:
      context: ./api
    image: odmig-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    command: ["celery", "-A", "app.celery_init:celery", "worker", "-Q", "mail", "--loglevel=INFO", "--concurrency=4"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - staging:/staging:rw
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 2G

  worker-cal-contacts:
    build:
      context: ./api
    image: odmig-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    command: ["celery", "-A", "app.celery_init:celery", "worker", "-Q", "calendar,contacts", "--loglevel=INFO", "--concurrency=2"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 1G

  worker-onedrive:
    build:
      context: ./api
    image: odmig-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    command: ["celery", "-A", "app.celery_init:celery", "worker", "-Q", "onedrive", "--loglevel=INFO", "--concurrency=4"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - staging:/staging:rw
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 4G

  worker-maintenance:
    build:
      context: ./api
    image: odmig-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    command: ["celery", "-A", "app.celery_init:celery", "worker", "-Q", "maintenance", "--loglevel=INFO", "--concurrency=1"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]

  beat:
    build:
      context: ./api
    image: odmig-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    command: ["celery", "-A", "app.celery_init:celery", "beat", "--loglevel=INFO"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odmig}
      POSTGRES_USER: ${POSTGRES_USER:-odmig}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odmig} -d ${POSTGRES_DB:-odmig}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.enable-lifecycle"
    networks: [internal]
    ports: ["127.0.0.1:9090:9090"]

networks:
  internal:
    driver: bridge

volumes:
  staging:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
